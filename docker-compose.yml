services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-golinks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}
      POSTGRES_DB: ${POSTGRES_DB:-golinks}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-golinks} -d ${POSTGRES_DB:-golinks}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not exposed to the host here — only the `app` container needs DB
    # access. For local `npm run dev` against this same database, opt in
    # explicitly with docker-compose.dev.yml (see README).

  migrate:
    build:
      context: .
      target: migrator
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-golinks}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-golinks}
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-golinks}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-golinks}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env.docker}
      AUTH_TRUST_HOST: "true"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?set ADMIN_PASSWORD_HASH in .env.docker}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
