# Opt-in override that exposes Postgres to the host, for local `npm run
# dev` against the same database the Docker stack uses. Not loaded by
# default — pass both files explicitly:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.docker up -d db
services:
  db:
    ports:
      - "5432:5432"
